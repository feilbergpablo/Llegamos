<div id="historial" class="historial">
    <h2>📋 Historial de movimientos</h2>

    {% if historial %}
        {% for item in historial %}
            <div class="movimiento">

                <strong>{{ item.tipo }}</strong><br>

                <span class="categoria">
                    🏷 {{ item.categoria }}
                </span><br>

                {{ item.descripcion }}<br>

                <span class="fecha">
                    📅 {{ item.fecha }}
                </span><br>

                ${{ item.monto }}

                <form
                    action="/eliminar"
                    method="POST"
                    style="padding:0;background:transparent;margin-top:12px;"
                >

                    <a href="/editar/{{ item.id }}">
                        <button
                            type="button"
                            style="
                                background:#2563eb;
                                margin-bottom:10px;
                            "
                        >
                            ✏️ Editar
                        </button>
                    </a>

                    <input
                        type="hidden"
                        name="tipo"
                        value="{{ item.tipo_original }}"
                    >

                    <input
                        type="hidden"
                        name="indice"
                        value="{{ item.indice }}"
                    >

                    <button class="eliminar" type="submit">
                        🗑 Eliminar
                    </button>

                </form>

            </div>
        {% endfor %}
    {% else %}
        <p>No hay movimientos cargados todavía.</p>
    {% endif %}
</div>
