<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar movimiento</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            margin:0;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            padding:20px;
        }

        .container{
            max-width:600px;
            margin:auto;
            background:rgba(255,255,255,0.08);
            padding:25px;
            border-radius:20px;
        }

        h1{
            margin-top:0;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:15px;
            margin-bottom:15px;
            border:none;
            border-radius:12px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:12px;
            background:#22c55e;
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
        }

        .volver{
            display:block;
            margin-top:15px;
            text-align:center;
            color:#93c5fd;
            text-decoration:none;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>✏️ Editar movimiento</h1>

    <form method="POST">

        <input
            type="text"
            name="descripcion"
            value="{{ movimiento.descripcion }}"
            required
        >

        <input
            type="text"
            name="categoria"
            value="{{ movimiento.categoria }}"
            required
        >

        <input
            type="number"
            step="0.01"
            name="monto"
            value="{{ movimiento.monto }}"
            required
        >

        <button type="submit">
            Guardar cambios
        </button>

    </form>

    <a class="volver" href="/">
        ← Volver al dashboard
    </a>

</div>

</body>
</html>
